<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slaco Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d0d0d;
        --panel: #171717;
        --line: #2b2b2b;
        --text: #f3f3f3;
        --text-soft: #a5a5a5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: "Manrope", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .topbar {
        max-width: 1280px;
        margin: 0 auto;
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .topbar h1 {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
      }
      .topbar input {
        width: 300px;
        padding: 0.6rem 0.7rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #101010;
        color: var(--text);
      }
      .main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 1rem 1rem;
        height: calc(100vh - 74px);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 1rem;
      }
      .panel h2 { margin: 0 0 0.8rem; }
      .placeholder { color: var(--text-soft); }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1>Slaco</h1>
      <input type="search" placeholder="Search employee..." />
    </header>
    <main class="main">
      <section class="panel">
        <h2>Employees</h2>
        <p class="placeholder">User cards will be loaded from API.</p>
      </section>
      <section class="panel">
        <h2>Posts & Comments</h2>
        <p class="placeholder">Posts and comments will be loaded after selecting a user.</p>
      </section>
    </main>
  </body>
</html>
